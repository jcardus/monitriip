name: Upload Native Builds To Stores

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: store-upload-main
  cancel-in-progress: false

jobs:
  build-and-submit:
    name: Build and submit iOS and Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Google Play service account
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON"
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json

      - name: Typecheck
        run: npm run typecheck

      - name: Queue production builds and store submissions
        run: eas build --platform all --profile production --auto-submit --non-interactive --no-wait
