name: Build and submit native apps

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build_ios:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android
    type: build
    params:
      platform: android
      profile: production

  submit_ios:
    name: Submit iOS
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  submit_android:
    name: Submit Android
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production
    hooks:
      before_submit:
        - name: Write Google Play service account
          run: |
            test -n "$GOOGLE_SERVICE_ACCOUNT_JSON"
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json
